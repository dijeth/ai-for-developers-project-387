name: Weekly Lighthouse Audit
on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * 1" # Every Monday at 2:00 AM UTC
jobs:
  lighthouse:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Launch application with Docker Compose
        run: docker compose up -d --build --wait

      - name: Run Lighthouse CI
        id: lighthouse
        continue-on-error: true
        run: |
          npm install -g @lhci/cli@0.15.x

          if lhci autorun; then
            echo "status=success" >> "$GITHUB_OUTPUT"
          else
            echo "status=failure" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload Lighthouse CI results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lighthouse-results
          path: .lighthouseci/
          include-hidden-files: true
          if-no-files-found: warn

      - name: Stop application
        if: always()
        run: docker compose down

      - name: Fail workflow when Lighthouse CI fails
        if: steps.lighthouse.outputs.status == 'failure'
        run: |
          echo "Lighthouse CI failed. Stopping workflow before regression comparison."
          exit 1

      - name: Download Previous Report
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: lighthouse-schedule.yml
          name: lighthouse-results
          path: ${{ runner.temp }}/lighthouseci-old
          if_no_artifact_found: warn

      - name: Detect baseline report
        id: baseline
        run: |
          if [ -d "$RUNNER_TEMP/lighthouseci-old" ] && [ -n "$(find "$RUNNER_TEMP/lighthouseci-old" -type f | head -n 1)" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip comparison when baseline is missing
        if: steps.baseline.outputs.available != 'true'
        run: |
          echo "No previous Lighthouse baseline found."
          echo "Comparison is skipped for this run; current report is stored as baseline artifact."

      - name: Extract Lighthouse metrics summary
        if: steps.baseline.outputs.available == 'true'
        run: |
          node -e "
            const fs = require('fs');

            const summarize = (dir) => {
              const manifestPath = dir + '/manifest.json';
              if (!fs.existsSync(manifestPath)) return [];
              const manifest = JSON.parse(fs.readFileSync(manifestPath, 'utf8'));
              const representative = manifest.filter(r => r.isRepresentativeRun);
              return representative.map(r => ({
                url: r.url,
                performance: r.summary.performance,
                accessibility: r.summary.accessibility,
                'best-practices': r.summary['best-practices'],
                seo: r.summary.seo,
              }));
            };

            const newResults = summarize('.lighthouseci');
            const oldResults = summarize('$RUNNER_TEMP/lighthouseci-old');

            const fmt = (results) =>
              results.map(r =>
                '  ' + r.url + ':\n' +
                '    performance=' + (r.performance * 100).toFixed(0) + '\n' +
                '    accessibility=' + (r.accessibility * 100).toFixed(0) + '\n' +
                '    best-practices=' + (r['best-practices'] * 100).toFixed(0) + '\n' +
                '    seo=' + (r.seo * 100).toFixed(0)
              ).join('\n');

            const summary = 'NEW results:\n' + fmt(newResults) + '\n\nPREVIOUS results:\n' + fmt(oldResults);
            console.log(summary);
            fs.writeFileSync('$RUNNER_TEMP/lh-summary.txt', summary, 'utf8');
          "

      - name: Run OpenCode
        if: steps.baseline.outputs.available == 'true'
        timeout-minutes: 10
        uses: anomalyco/opencode/github@v1.4.14
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GIT_AUTHOR_NAME: "github-actions[bot]"
          GIT_AUTHOR_EMAIL: "github-actions[bot]@users.noreply.github.com"
          GIT_COMMITTER_NAME: "github-actions[bot]"
          GIT_COMMITTER_EMAIL: "github-actions[bot]@users.noreply.github.com"
        with:
          model: opencode/kimi-k2.5
          use_github_token: true
          prompt: |
            Read the file '${{ runner.temp }}/lh-summary.txt'. It contains Lighthouse scores (0-100) for each URL: NEW results and PREVIOUS results.

            1. Compare NEW vs PREVIOUS scores for each URL.
            2. If any score dropped by 10 points or more, CREATE a GitHub Issue titled "Performance Regression Detected" listing the affected URLs, which scores dropped, and recommendations for improvement.
            3. If no score dropped by 10 points or more, output a short comparison summary to the console only. Do not create any issues or files.
