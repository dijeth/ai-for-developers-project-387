name: E2E Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        working-directory: ./apps/e2e
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('apps/e2e/package-lock.json') }}

      - name: Install Playwright Browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        working-directory: ./apps/e2e
        run: npx playwright install --with-deps chromium

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and start services
        run: |
          # Build and start services with unified docker compose
          # --wait flag waits for healthchecks to pass
          docker compose --profile e2e up --build -d --wait

          # Verify services are running
          docker compose ps

      - name: Run Playwright tests
        working-directory: ./apps/e2e
        env:
          WEB_SERVER_MODE: external
        run: |
          # Wait until web and API health endpoints are reachable
          for i in {1..45}; do
            curl -fsS http://localhost:3000/ >/dev/null && curl -fsS http://localhost:3001/health >/dev/null && break
            if [ "$i" -eq 45 ]; then
              echo "Services did not become ready in time"
              exit 1
            fi
            sleep 2
          done
          npx playwright test

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: apps/e2e/playwright-report/
          retention-days: 30

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-results
          path: apps/e2e/test-results/
          retention-days: 7

      - name: Show logs on failure
        if: failure()
        run: |
          echo "=== API Logs ==="
          docker compose logs api-e2e
          echo "=== Web Logs ==="
          docker compose logs web-e2e

      - name: Cleanup
        if: always()
        run: docker compose --profile e2e down -v
