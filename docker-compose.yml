services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${PORT:-7860}:${PORT:-7860}"
    volumes:
      - sqlite_data:/data
    environment:
      - NODE_ENV=production
      - PORT=${PORT:-7860}
      - API_PORT=${API_PORT:-3001}
      - DATABASE_URL=file:/data/prod.db
      - TZ=UTC
    container_name: calendar-app
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "-q",
          "-O",
          "-",
          "http://localhost:${API_PORT:-3001}/health",
        ]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 40s

volumes:
  sqlite_data:
