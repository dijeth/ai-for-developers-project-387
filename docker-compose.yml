# Unified Docker Compose configuration for all environments
# Usage:
#   docker compose --profile dev up      # Local development
#   docker compose --profile e2e up      # E2E testing
#   docker compose --profile prod up     # Production (Hugging Face)
#
# For fast E2E debug without rebuild:
#   docker compose -f docker-compose.yml -f docker-compose.override.local.yml --profile e2e up

x-api-base: &api-base
  build:
    context: .
    dockerfile: Dockerfile
    target: deps
  volumes:
    - .:/app
    - node_modules:/app/node_modules
  environment:
    - NODE_ENV=development
    - PORT=3001
    - TZ=UTC

services:
  # ==========================================
  # DEVELOPMENT PROFILE
  # ==========================================

  contracts-watcher:
    <<: *api-base
    profiles: ["dev"]
    command: >
      sh -c "
        npm run build -w api-spec &&
        npm run generate:types -w web &&
        npm run dev -w api-spec &
        npm run watch:types -w web &
        wait
      "
    container_name: calendar-contracts-watcher
    healthcheck:
      test:
        [
          "CMD",
          "sh",
          "-c",
          "[ -s /app/packages/contracts/openapi.yaml ] && [ -s /app/apps/web/src/types/generated/api-types.ts ]",
        ]
      interval: 2s
      timeout: 5s
      retries: 30
      start_period: 5s

  api-dev-init:
    <<: *api-base
    profiles: ["dev"]
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - dev_data:/data
    environment:
      - DATABASE_URL=file:/data/dev.db
    command: >
      sh -c "
        npm run db:push -w api -- --accept-data-loss &&
        npm run db:seed -w api
      "
    container_name: calendar-api-dev-init
    restart: "no"
    depends_on:
      contracts-watcher:
        condition: service_healthy
    healthcheck:
      disable: true

  api-dev:
    <<: *api-base
    profiles: ["dev"]
    ports:
      - "3001:3001"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - dev_data:/data
    environment:
      - DATABASE_URL=file:/data/dev.db
    command: npm run dev -w api
    container_name: calendar-api-dev
    depends_on:
      api-dev-init:
        condition: service_completed_successfully
    healthcheck:
      disable: true

  prism:
    image: stoplight/prism:5
    profiles: ["dev"]
    ports:
      - "4010:4010"
    volumes:
      - ./packages/contracts/openapi.yaml:/openapi.yaml:ro
    # -m false disables multiprocess mode to avoid Node.js 20 compatibility issues
    # -h 0.0.0.0 allows connections from outside the container (Docker port forwarding)
    command: proxy /openapi.yaml http://api-dev:3001 --errors -p 4010 -m false -h 0.0.0.0
    container_name: calendar-prism
    depends_on:
      api-dev:
        condition: service_started
      contracts-watcher:
        condition: service_healthy
    develop:
      watch:
        - action: restart
          path: ./packages/contracts/openapi.yaml

  web-dev:
    <<: *api-base
    profiles: ["dev"]
    ports:
      - "3000:3000"
    environment:
      - VITE_API_TARGET=http://prism:4010
    # --host makes Vite listen on 0.0.0.0 to accept Docker port forwarding
    command: npm run dev -w web -- --host
    container_name: calendar-web-dev
    depends_on:
      prism:
        condition: service_started
      contracts-watcher:
        condition: service_healthy

  # ==========================================
  # E2E TESTING PROFILE
  # ==========================================

  api-e2e:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    profiles: ["e2e"]
    ports:
      - "3001:3001"
    # Keep CI clean: no bind-mount in base e2e profile.
    # Local bind-mount for fast debug lives in docker-compose.override.local.yml.
    volumes:
      - node_modules:/app/node_modules
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/data/test.db
      - E2E_TESTING=true
    command: >
      sh -c "
        npm run db:generate -w api &&
        npm run db:push -w api -- --accept-data-loss &&
        npm run start:prod -w api
      "
    container_name: calendar-api-e2e
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:3001/health"]
      interval: 2s
      timeout: 5s
      retries: 30
      start_period: 10s

  web-e2e:
    build:
      context: .
      dockerfile: Dockerfile
      target: e2e-web
    profiles: ["e2e"]
    ports:
      - "3000:3000"
    container_name: calendar-web-e2e
    depends_on:
      api-e2e:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:3000/"]
      interval: 2s
      timeout: 5s
      retries: 30
      start_period: 10s

  # ==========================================
  # PRODUCTION PROFILE (Hugging Face)
  # ==========================================

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    profiles: ["prod"]
    ports:
      - "7860:7860"
    volumes:
      - sqlite_data:/data
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_URL=file:/data/prod.db
      - TZ=UTC
    container_name: calendar-app
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:3001/health"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 40s

volumes:
  dev_data:
  node_modules:
  sqlite_data:
