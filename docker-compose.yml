version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    ports:
      - "7860:7860"
    volumes:
      # Persist SQLite database in /data (Hugging Face Spaces compatible)
      - sqlite_data:/data
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_URL=file:/data/prod.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:7860/api/owner"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  sqlite_data:
    driver: local
